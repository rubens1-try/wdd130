<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Wild Current</title>
    <meta name="description"
      content="This page will give information about the contact and address">
    <meta name="author" content="Rubenskey Merisier">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/webpage-logo.jpg" alt="Company Logo" width="150">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>
        <div class="contact-info">
            <h1>Wild Current A water Rafting Company</h1>
            <div class="tipo">
                <p>No 5, Ruelle V.Latortue, Delmas 33</p>
                <p>Port-au-Prince, Haiti</p>
                <p>HT6120</p>
                <p>Phone: (509) 34 43 1038</p>
                <p>info@wildcurrent.com</p>
            </div>
        </div>

        <div class="map-feedback">
            <div class="maps">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m16!1m12!1m3!1d1704.1919670603938!2d-72.29729288210203!3d18.553233336035717!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!2m1!1srue%20v.Latortue%20Delmas%2033!5e0!3m2!1sfr!2sht!4v1764919713334!5m2!1sfr!2sht"
                  width="600" height="450" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>

            <div class="newsletter">
                <form>
                    <label for="username">Fullname</label>
                    <input type="text" name="username" id="username" placeholder="ex: John Nolan">
                    <label for="useremail">email address</label>
                    <input type="email" name="useremail" id="useremail"
                      placeholder="ex: john69@gmail.com">

                    <div class="purpose">
                        <div class="mes">
                            <p>Message purposes:</p>
                        </div>
                        <div class="sage">
                            <label for="purposes">General Inquiry</label>
                            <input type="radio" name="purposes" id="purposes">
                            <label for="purposes">Reservation Question</label>
                            <input type="radio" name="purposes" id="purposes">
                            <label for="purposes">Website Suggestion</label>
                            <input type="radio" name="purposes" id="purposes">
                        </div>
                    </div>

                    <textarea name="message" id="message" rows="4"
                      placeholder="Type here"></textarea>

                    <div class="subscription">
                        <label for="subscription">Please Subscribe me to the monthly
                            newsletter</label>
                        <input type="checkbox" name="subscription" id="subscription">
                    </div>

                    <button type="submit">Connect with us!</button>
                </form>
            </div>
        </div>

        <div class="employees">
            <div class="smile">
                <h2>We are here yo make you smile</h2>
            </div>

            <div class="board">
                <figure>
                    <img src="images/CEO.jpg" alt="CEO of Rapids" width="200">
                    <figcaption>CEO of Wild Current</figcaption>
                </figure>
                <figure>
                    <img src="images/assistant.jpg" alt="Chief People Officer" width="200">
                    <figcaption>Chief people officer</figcaption>
                </figure>
                <figure>
                    <img src="images/manager.jpg" alt="Contact center manager" width="200">
                    <figcaption>Contact Center Manager</figcaption>
                </figure>
            </div>
        </div>
    </main>

    <footer>
        <p>©2026 | Wild Current | Rubenskey Merisier</p>
        <nav class="socialmedia">
            <a href="https://www.facebook.com"><img src="images/facebook.svg" alt="Facebook Icon"
                  width="50"></a>
            <a href="https://www.instagram.com"><img src="images/instagram.svg" alt="Instagram Icon"
                  width="50"></a>
            <a href="https://www.linkedin.com"><img src="images/linkedin.svg" alt="LinkedIn Icon"
                  width="50"></a>
        </nav>
    </footer>
</body>

</html>
