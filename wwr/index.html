<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | WDD 130</title>
    <meta name="description" content="This is the home page of the Wild Current rafting Company.">
    <meta name="author" content="Rubenskey Merisier">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/webpage-logo.jpg" alt="Company Logo" width="150">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>
    <main>
        <div class="hero">
            <img src="images/index-background.jpg" alt="Background Picture">
            <h1>With Wild Current, come enjoy the water flow!</h1>
            <nav>
                <a href="trips.html">See our Trips!</a>
            </nav>
            <div class="newsletter">
                <form>
                    <label for="Fullname">Fullname:</label>
                    <input type="text" name="Fullname" id="Fullname" placeholder="ex.: John Nolan">
                    <label for="email">Email address</label>
                    <input type="email" name="email" id="email" placeholder="ex.: john69@gmail.com">
                    <div class="subscription">
                        <label for="newsletter">I confirm that I want to receive daily newsletter
                            via my
                            email</label>
                        <input type="checkbox" name="newsletter" id="newsletter">
                    </div>
                    <button type="submit">Submit</button>
                </form>
            </div>
        </div>
        <section>
            <div class="adventure">
                <h2>What we do?</h2>
                <div class="adventure-gallery">
                    <figure>
                        <img src="images/water-flow.jpg" alt="Water Flow">
                        <figcaption>We enjoy the flow!</figcaption>
                    </figure>
                    <figure>
                        <img src="images/live.jpg" alt="Live Experience">
                        <figcaption>Live unique experience</figcaption>
                    </figure>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>©2026 | Wild Current | Rubenskey Merisier</p>
        <nav class="socialmedia">
            <a href="https://www.facebook.com"><img src="images/facebook.svg" alt="Facebook Icon"
                  width="50"></a>
            <a href="https://www.instagram.com"><img src="images/instagram.svg" alt="Instagram Icon"
                  width="50"></a>
            <a href="https://www.linkedin.com"><img src="images/linkedin.svg" alt="LinkedIn Icon"
                  width="50"></a>
        </nav>
    </footer>
</body>

</html>
