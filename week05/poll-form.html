<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poll Form</title>
</head>

<body>
    <header></header>
    <main>
        <form action="contact information">
            <label for="fullname">Full Name:</label>
            <input type="text" id="fullname" name="fullname" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
        </form>
        <form action="question">
            <label for="browser">What is your favorite internet Browser?</label>
            <select name="browser" id="browser">
                <option value="chrome">Chrome</option>
                <option value="edge">Edge</option>
                <option value="firefox">FireFox</option>
                <option value="other"> Other</option>
            </select>

            <label for="pet">Do you have a household pet?</label>
            <input type="checkbox" id="pet" name="pet">

            <label for="feedback">List the place you have lived:</label>
            <textarea name="feedback" id="feedback" rows="4"
              placeholder="Delmas, Petion-Ville, Sao Paulo, Fontamara"></textarea>

            <button type="submit">Submit Poll</button>
        </form>
    </main>
    <footer>
        <p>©2026 | HTML Form - User Poll Activity | Rubenskey Merisier
        </p>
    </footer>
</body>

</html>
